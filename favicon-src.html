<!DOCTYPE html>
<html>
<head><meta charset="UTF-8">
<style>*{margin:0;padding:0}html,body{width:100%;height:100%;overflow:hidden}svg{display:block;width:100vw;height:100vh}</style>
</head>
<body>
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b2740"/>
      <stop offset="1" stop-color="#0d1320"/>
    </linearGradient>
  </defs>
  <!-- 角丸の背景 -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="6" y="6" width="500" height="500" rx="106" fill="none" stroke="#3b82f6" stroke-width="12" opacity=".85"/>

  <!-- レジスタンス（赤・上） -->
  <line x1="96" y1="150" x2="416" y2="150" stroke="#ff5d6c" stroke-width="16" stroke-linecap="round" stroke-dasharray="2 34"/>
  <!-- 現在値（青・中央・実線） -->
  <line x1="80" y1="256" x2="432" y2="256" stroke="#3b82f6" stroke-width="20" stroke-linecap="round"/>
  <!-- サポート（緑・下） -->
  <line x1="96" y1="362" x2="416" y2="362" stroke="#26c281" stroke-width="16" stroke-linecap="round" stroke-dasharray="2 34"/>

  <!-- ローソク足（中央に1本ずつ象徴的に） -->
  <g stroke-linecap="round">
    <line x1="186" y1="120" x2="186" y2="300" stroke="#26c281" stroke-width="10"/>
    <rect x="168" y="200" width="36" height="86" rx="6" fill="#26c281"/>
    <line x1="326" y1="210" x2="326" y2="400" stroke="#ff5d6c" stroke-width="10"/>
    <rect x="308" y="250" width="36" height="96" rx="6" fill="#ff5d6c"/>
  </g>
</svg>
</body>
</html>
